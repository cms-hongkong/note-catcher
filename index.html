<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Note Catcher - Play Only</title>
    <style>
        :root {
            --mint: #B2F2BB; --pink: #FFD6E0; --blue: #A2D2FF; --yellow: #FEF9E7; --text: #5B5B5B;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(180deg, #E3F2FD 0%, #F3E5F5 100%);
            margin: 0; padding: 0; height: 100vh; height: 100dvh; width: 100vw;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        #app-wrapper {
            width: 96%; height: 98%; max-width: 800px;
            display: flex; flex-direction: column;
            background: rgba(255, 255, 255, 0.4); border-radius: 25px;
            overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 4px solid white;
        }
        /* Header 簡化：只留 LV, TIME 同 SCORE */
        .header {
            flex: 0 0 60px; background: white;
            display: flex; justify-content: space-around; align-items: center; padding: 5px; z-index: 100;
        }
        .stat-box {
            background: var(--yellow); padding: 4px 15px; border-radius: 12px; border: 1.5px solid #FAD7A0;
            text-align: center; min-width: 80px;
        }
        .stat-label { font-size: 0.55rem; color: #888; display: block; }
        .stat-val { font-size: 1rem; color: #FF85A1; display: block; font-weight: bold; }

        #game-area { flex: 1; position: relative; width: 100%; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #character {
            position: absolute; bottom: 5px; width: 60px; height: 60px; font-size: 50px;
            display: flex; justify-content: center; align-items: center; transition: left 0.2s ease-out; z-index: 50;
        }
        #keyboard {
            flex: 0 0 160px; display: flex; background: #222; padding: 0 4px 8px 4px; z-index: 90;
        }
        .key {
            flex: 1; background: white; border: 1px solid #ddd; border-radius: 0 0 8px 8px;
            position: relative; display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 12px; font-weight: bold; font-size: 0.85rem; color: #ccc; cursor: pointer;
        }
        .key.active { background: var(--mint); transform: translateY(2px); }
        .key.black { background: #333; flex: 0.6; height: 60%; margin-left: -3%; margin-right: -3%; z-index: 95; border-radius: 0 0 4px 4px; }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center;
        }
        .btn-fancy {
            background: #FF85A1; color: white; padding: 15px 45px; border-radius: 50px; font-size: 1.3rem; border: none; box-shadow: 0 4px 0 #D6336C; cursor: pointer; font-weight: bold;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <div id="start-screen" class="overlay">
            <h1 style="color: #FF85A1; margin-bottom: 20px; font-size: 3rem;">Note Catcher 🎶</h1>
            <p style="margin-bottom: 30px; font-size: 1.1rem;">望住五線譜提示，接住跌落嚟嘅音符！</p>
            <button class="btn-fancy" onclick="startGame()">立即開始</button>
        </div>

        <div id="msg-screen" class="overlay hidden">
            <h1 id="msg-title">Level Up!</h1>
            <p id="msg-body" style="font-size: 1.5rem;"></p>
            <button class="btn-fancy" onclick="nextAction()">繼續</button>
        </div>

        <div class="header">
            <div class="stat-box"><span class="stat-label">LEVEL</span><span id="level-val" class="stat-val">1</span></div>
            <div class="stat-box"><span class="stat-label">TIME</span><span id="timer-val" class="stat-val">60</span></div>
            <div class="stat-box"><span class="stat-label">SCORE</span><span id="score-val" class="stat-val">0</span></div>
        </div>

        <div id="game-area">
            <canvas id="staffCanvas"></canvas>
            <div id="character">🐥</div>
        </div>

        <div id="keyboard">
            <div class="key" data-note="C4">C</div><div class="key black"></div>
            <div class="key" data-note="D4">D</div><div class="key black"></div>
            <div class="key" data-note="E4">E</div>
            <div class="key" data-note="F4">F</div><div class="key black"></div>
            <div class="key" data-note="G4">G</div><div class="key black"></div>
            <div class="key" data-note="A4">A</div><div class="key black"></div>
            <div class="key" data-note="B4">B</div>
            <div class="key" data-note="C5">C5</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('staffCanvas');
        const ctx = canvas.getContext('2d');
        const charElem = document.getElementById('character');
        
        let score = 0, level = 1, timeLeft = 60, gameActive = false;
        let timerId, animationId, fallingNote = null;

        const levelChars = ["🐥", "🐱", "🦄"];
        const s = 26; 
        const noteMap = { "C4": -6, "D4": -5, "E4": -4, "F4": -3, "G4": -2, "A4": -1, "B4": 0, "C5": 1 };
        const notePool = Object.keys(noteMap);

        function resize() {
            canvas.width = document.getElementById('game-area').offsetWidth;
            canvas.height = document.getElementById('game-area').offsetHeight;
        }
        window.addEventListener('resize', resize);

        function drawStaff() {
            const centerY = canvas.height * 0.24; 
            ctx.strokeStyle = "#5B5B5B"; ctx.lineWidth = 1.5;
            for (let i = -2; i <= 2; i++) {
                let y = centerY + (i * s); ctx.beginPath(); ctx.moveTo(20, y); ctx.lineTo(canvas.width - 20, y); ctx.stroke();
            }
            ctx.save(); ctx.fillStyle = "#333"; ctx.font = `${s * 9}px Arial`; ctx.textBaseline = "middle";
            ctx.fillText("𝄞", 25, centerY + (s * 0.2) - 18); ctx.restore();
        }

        function createNote() {
            let name; do { name = notePool[Math.floor(Math.random() * notePool.length)]; } while (fallingNote && name === fallingNote.name);
            const centerY = canvas.height * 0.24;
            const steps = noteMap[name]; const staffY = centerY - (steps * (s / 2));
            const index = notePool.indexOf(name);
            const startX = 100 + (index * ((canvas.width - 200) / (notePool.length - 1)));
            fallingNote = { name, x: startX, staffY, currentY: staffY, speed: 1.0 + (level * 0.85), status: 'falling' };
        }

        function update() {
            if (!gameActive) return; ctx.clearRect(0, 0, canvas.width, canvas.height); drawStaff();
            if (fallingNote) {
                ctx.save(); ctx.globalAlpha = 0.2; drawNoteHead(fallingNote.x, fallingNote.staffY, fallingNote.name); ctx.restore();
                if (fallingNote.status === 'falling') fallingNote.currentY += fallingNote.speed;
                const color = fallingNote.status === 'hit' ? '#4CAF50' : '#333';
                ctx.fillStyle = ctx.strokeStyle = color; drawNoteHead(fallingNote.x, fallingNote.currentY, fallingNote.name);
                if (fallingNote.currentY > canvas.height + 30) createNote();
            }
            animationId = requestAnimationFrame(update);
        }

        function drawNoteHead(x, y, name) {
            ctx.beginPath(); ctx.ellipse(x, y, s * 0.45, s * 0.35, -Math.PI / 8, 0, 2 * Math.PI); ctx.fill();
            if (name === "C4") { ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x - 20, y); ctx.lineTo(x + 20, y); ctx.stroke(); }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            score = 0; level = 1; startLevel();
        }

        function startLevel() {
            timeLeft = 60 - (level - 1) * 10; charElem.innerText = levelChars[level - 1];
            updateUI(); resize(); createNote(); gameActive = true;
            if (timerId) clearInterval(timerId);
            timerId = setInterval(() => { timeLeft--; document.getElementById('timer-val').innerText = timeLeft; if (timeLeft <= 0) endLevel(); }, 1000);
            cancelAnimationFrame(animationId); update();
        }

        function endLevel() {
            gameActive = false; clearInterval(timerId);
            document.getElementById('msg-screen').classList.remove('hidden');
            document.getElementById('msg-body').innerText = `最終得分: ${score}`;
            if (level >= 3) {
                document.getElementById('msg-title').innerText = "🏆 挑戰完畢！";
                document.getElementById('msg-btn').innerText = "再玩一次";
            } else {
                document.getElementById('msg-title').innerText = `Level ${level} 完成!`;
                document.getElementById('msg-btn').innerText = "下一關";
            }
        }

        function nextAction() {
            document.getElementById('msg-screen').classList.add('hidden');
            if (level < 3) { level++; startLevel(); } else { location.reload(); }
        }

        function updateUI() { document.getElementById('score-val').innerText = score; document.getElementById('level-val').innerText = level; }

        document.getElementById('keyboard').addEventListener('pointerdown', (e) => {
            const key = e.target.closest('.key');
            if (!key || !gameActive || !fallingNote) return;
            const selected = key.dataset.note;
            if (selected === fallingNote.name) {
                score += 10; charElem.style.left = (fallingNote.x - 30) + "px"; fallingNote.status = 'hit';
                updateUI(); setTimeout(createNote, 100);
            } else { score = Math.max(0, score - 5); updateUI(); }
            key.classList.add('active'); setTimeout(() => key.classList.remove('active'), 150);
        });
        window.onload = resize;
    </script>
</body>
</html>
