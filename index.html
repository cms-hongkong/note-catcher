<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Note Catcher - Piano Hero</title>
    <style>
        :root {
            --mint: #B2F2BB;
            --pink: #FFD6E0;
            --blue: #A2D2FF;
            --yellow: #FEF9E7;
            --text: #5B5B5B;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(180deg, #E3F2FD 0%, #F3E5F5 100%);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: var(--text);
        }

        /* 頂部 Header - 確保在平板上清晰可見 */
        .header {
            flex: 0 0 auto;
            background: white;
            padding: 15px 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .stat-box {
            background: var(--yellow);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            border: 2px solid #FAD7A0;
            text-align: center;
            min-width: 80px;
        }

        .stat-label { font-size: 0.7rem; color: #888; display: block; text-transform: uppercase; }
        .stat-val { font-size: 1.2rem; color: #FF85A1; display: block; }

        /* 遊戲舞台 */
        #game-area {
            flex: 1; /* 自動填滿中間空間 */
            position: relative;
            width: 100%;
            background: rgba(255,255,255,0.2);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #character {
            position: absolute;
            bottom: 20px;
            width: 80px;
            height: 80px;
            font-size: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: left 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
            pointer-events: none;
        }

        /* 鋼琴琴鍵 */
        #keyboard {
            flex: 0 0 220px; /* 固定高度，唔會被縮放影響 */
            display: flex;
            background: #222;
            padding: 0 5px 10px 5px;
            position: relative;
            z-index: 90;
        }

        .key {
            flex: 1;
            background: white;
            border: 1px solid #ddd;
            border-radius: 0 0 10px 10px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #ccc;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            box-shadow: inset 0 -5px 0 #eee;
        }

        .key.active { background: var(--mint); transform: translateY(2px); box-shadow: none; }

        .key.black {
            background: #333;
            flex: 0.6;
            height: 60%;
            margin-left: -3%;
            margin-right: -3%;
            z-index: 95;
            border-radius: 0 0 5px 5px;
            color: transparent;
        }

        /* 彈出視窗 */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .btn-fancy {
            background: #FF85A1;
            color: white;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 1.4rem;
            border: none;
            box-shadow: 0 6px 0 #D6336C;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }

        .btn-fancy:active { transform: translateY(3px); box-shadow: 0 3px 0 #D6336C; }

        input {
            padding: 15px;
            font-size: 1.3rem;
            border-radius: 15px;
            border: 3px solid var(--pink);
            text-align: center;
            width: 80%;
            max-width: 300px;
            margin: 20px 0;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="start-screen" class="overlay">
        <h1 style="font-size: 3rem; color: #FF85A1; margin-bottom: 10px;">Note Catcher</h1>
        <p>準備好挑戰五線譜未？請輸入名字：</p>
        <input type="text" id="playerNameInput" placeholder="你的名字" maxlength="10">
        <button class="btn-fancy" onclick="startGame()">開始遊戲 🎶</button>
    </div>

    <div id="msg-screen" class="overlay hidden">
        <h1 id="msg-title" style="font-size: 2.5rem;">Level Up!</h1>
        <p id="msg-body" style="font-size: 1.5rem;"></p>
        <button class="btn-fancy" id="msg-btn" onclick="nextAction()">NEXT</button>
    </div>

    <div class="header" id="game-header">
        <div class="stat-box">
            <span class="stat-label">Player</span>
            <span id="name-val" class="stat-val">---</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Level</span>
            <span id="level-val" class="stat-val">1</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Time Left</span>
            <span id="timer-val" class="stat-val">60</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Score</span>
            <span id="score-val" class="stat-val">0</span>
        </div>
    </div>

    <div id="game-area">
        <canvas id="staffCanvas"></canvas>
        <div id="character">🐥</div>
    </div>

    <div id="keyboard">
        <div class="key" data-note="C4">C</div>
        <div class="key black"></div>
        <div class="key" data-note="D4">D</div>
        <div class="key black"></div>
        <div class="key" id="key-E4" data-note="E4">E</div>
        <div class="key" data-note="F4">F</div>
        <div class="key black"></div>
        <div class="key" data-note="G4">G</div>
        <div class="key black"></div>
        <div class="key" data-note="A4">A</div>
        <div class="key black"></div>
        <div class="key" data-note="B4">B</div>
        <div class="key" data-note="C5">C5</div>
    </div>

    <script>
        const canvas = document.getElementById('staffCanvas');
        const ctx = canvas.getContext('2d');
        const charElem = document.getElementById('character');
        
        // 遊戲狀態
        let score = 0;
        let level = 1;
        let timeLeft = 60;
        let gameActive = false;
        let timerId;
        let targetNote = "";
        let playerName = "";

        // 設定角色 (依 Level 變化)
        const levelChars = ["🐥", "🐱", "🦄"];
        
        // 音符設定 (中心 B4 為 0)
        const s = 30; // 增加間距使五線譜更清晰
        const noteMap = {
            "C4": -6, "D4": -5, "E4": -4, "F4": -3, "G4": -2, "A4": -1, "B4": 0, "C5": 1
        };
        const notePool = Object.keys(noteMap);

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = document.getElementById('game-area').offsetHeight;
            draw();
        }
        window.addEventListener('resize', resize);
        window.onload = resize;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerY = canvas.height / 2;
            
            // 1. 畫五線譜 (加粗線條)
            ctx.strokeStyle = "#5B5B5B";
            ctx.lineWidth = 3;
            for (let i = -2; i <= 2; i++) {
                let y = centerY + (i * s);
                ctx.beginPath();
                ctx.moveTo(30, y);
                ctx.lineTo(canvas.width - 30, y);
                ctx.stroke();
            }

            // 2. 畫高音譜號 (放大5倍)
            ctx.save();
            ctx.fillStyle = "#333";
            // s 是 30, 原本約 4.5s，而家放大到 15s 左右
            ctx.font = `${s * 11}px Arial`; 
            ctx.textBaseline = "middle";
            // 位置調整：高音譜號底部對準下加一線，中心環繞第二線 (G)
            ctx.fillText("𝄞", 40, centerY + (s * 0.2)); 
            ctx.restore();

            // 3. 畫音符
            if (targetNote) {
                const steps = noteMap[targetNote];
                const y = centerY - (steps * (s / 2));
                const x = canvas.width / 2;

                // 音符頭
                ctx.fillStyle = "#333";
                ctx.beginPath();
                ctx.ellipse(x, y, s * 0.45, s * 0.35, -Math.PI / 8, 0, 2 * Math.PI);
                ctx.fill();

                // 下加線 (C4)
                if (targetNote === "C4") {
                    ctx.strokeStyle = "#333";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(x - 25, y);
                    ctx.lineTo(x + 25, y);
                    ctx.stroke();
                }
            }
        }

        function startGame() {
            playerName = document.getElementById('playerNameInput').value.trim() || "匿名小樂手";
            document.getElementById('name-val').innerText = playerName;
            document.getElementById('start-screen').classList.add('hidden');
            score = 0;
            level = 1;
            startLevel();
        }

        function startLevel() {
            timeLeft = 60 - (level - 1) * 10;
            charElem.innerText = levelChars[level - 1]; // 更換角色
            updateUI();
            nextNote();
            gameActive = true;
            
            if (timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-val').innerText = timeLeft;
                if (timeLeft <= 0) endLevel();
            }, 1000);
            
            resize();
        }

        function nextNote() {
            let next;
            // 確保問題唔會連續重複
            do {
                next = notePool[Math.floor(Math.random() * notePool.length)];
            } while (next === targetNote);
            
            targetNote = next;
            draw();
        }

        function updateUI() {
            document.getElementById('score-val').innerText = score;
            document.getElementById('level-val').innerText = level;
        }

        function endLevel() {
            gameActive = false;
            clearInterval(timerId);
            const msgScreen = document.getElementById('msg-screen');
            msgScreen.classList.remove('hidden');
            
            if (level >= 3) {
                document.getElementById('msg-title').innerText = "🏆 終極大師！";
                document.getElementById('msg-body').innerText = `${playerName}，你完成咗所有關卡！\n最終得分: ${score}`;
                document.getElementById('msg-btn').innerText = "再玩一次";
            } else {
                document.getElementById('msg-title').innerText = `Level ${level} 完成!`;
                document.getElementById('msg-body').innerText = `做得好！下一關個主角會變身！\n目前得分: ${score}`;
                document.getElementById('msg-btn').innerText = "進入下一關";
            }
        }

        function nextAction() {
            document.getElementById('msg-screen').classList.add('hidden');
            if (level < 3) {
                level++;
                startLevel();
            } else {
                location.reload(); // 重新開始
            }
        }

        // 鋼琴控制
        document.getElementById('keyboard').addEventListener('pointerdown', (e) => {
            const key = e.target.closest('.key');
            if (!key || !gameActive || !key.dataset.note) return;

            const selected = key.dataset.note;
            key.classList.add('active');
            setTimeout(() => key.classList.remove('active'), 150);

            if (selected === targetNote) {
                score += 10;
                // 角色郁動
                const rect = key.getBoundingClientRect();
                charElem.style.left = (rect.left + rect.width / 2 - 40) + "px";
                updateUI();
                nextNote();
            } else {
                score = Math.max(0, score - 5);
                updateUI();
            }
        });

    </script>
</body>
</html>
