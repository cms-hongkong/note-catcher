<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Note Catcher - Piano Master</title>
    <style>
        :root {
            --mint: #B2F2BB;
            --pink: #FFD6E0;
            --blue: #A2D2FF;
            --yellow: #FEF9E7;
            --text: #5B5B5B;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(180deg, #E3F2FD 0%, #F3E5F5 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        /* Header 區域 */
        .header {
            padding: 10px;
            display: flex;
            justify-content: space-around;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .stat-box {
            background: var(--yellow);
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
            border: 2px solid #FAD7A0;
            text-align: center;
            font-size: 0.9rem;
        }

        .stat-val { display: block; color: #FF85A1; font-size: 1.1rem; }

        /* 遊戲畫布區域 */
        #game-area {
            flex: 1;
            position: relative;
            background: rgba(255,255,255,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #character {
            position: absolute;
            bottom: 20px;
            font-size: 50px;
            transition: left 0.2s ease-out;
            pointer-events: none;
            z-index: 5;
        }

        /* 鋼琴區域 */
        #keyboard {
            height: 200px;
            display: flex;
            background: #333;
            padding: 0 2px 5px 2px;
            position: relative;
        }

        .key {
            flex: 1;
            background: white;
            border: 1px solid #ddd;
            border-radius: 0 0 5px 5px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 10px;
            font-weight: bold;
            color: #ccc;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .key.active { background: var(--mint); transform: translateY(2px); }

        .key.black {
            background: #222;
            flex: 0.6;
            height: 60%;
            margin-left: -3%;
            margin-right: -3%;
            z-index: 2;
            border-radius: 0 0 3px 3px;
        }

        /* 彈出視窗 */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .btn-fancy {
            background: #FF85A1;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            border: none;
            box-shadow: 0 5px 0 #D6336C;
            cursor: pointer;
            margin-top: 20px;
        }

        input {
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 10px;
            border: 2px solid var(--pink);
            text-align: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="start-screen" class="overlay">
        <h1 style="color: #FF85A1;">Note Catcher 🍭</h1>
        <p>請輸入大名以記錄分數：</p>
        <input type="text" id="playerName" placeholder="Your Name" maxlength="10">
        <button class="btn-fancy" onclick="initGame()">開始遊戲</button>
    </div>

    <div id="msg-screen" class="overlay hidden">
        <h1 id="msg-title">Level Complete!</h1>
        <p id="msg-body"></p>
        <button class="btn-fancy" id="msg-btn" onclick="handleNextLevel()">NEXT</button>
    </div>

    <div class="header">
        <div class="stat-box">NAME<span id="name-val" class="stat-val">---</span></div>
        <div class="stat-box">LEVEL<span id="level-val" class="stat-val">1</span></div>
        <div class="stat-box">TIME<span id="timer-val" class="stat-val">60</span></div>
        <div class="stat-box">SCORE<span id="score-val" class="stat-val">0</span></div>
    </div>

    <div id="game-area">
        <canvas id="staffCanvas"></canvas>
        <div id="character">👾</div>
    </div>

    <div id="keyboard">
        <div class="key" data-note="C4">C</div>
        <div class="key black" data-note="C#4"></div>
        <div class="key" data-note="D4">D</div>
        <div class="key black" data-note="D#4"></div>
        <div class="key" data-note="E4">E</div>
        <div class="key" data-note="F4">F</div>
        <div class="key black" data-note="F#4"></div>
        <div class="key" data-note="G4">G</div>
        <div class="key black" data-note="G#4"></div>
        <div class="key" data-note="A4">A</div>
        <div class="key black" data-note="A#4"></div>
        <div class="key" data-note="B4">B</div>
        <div class="key" data-note="C5">C5</div>
    </div>

    <script>
        const canvas = document.getElementById('staffCanvas');
        const ctx = canvas.getContext('2d');
        const character = document.getElementById('character');
        
        let score = 0;
        let level = 1;
        let timeLeft = 60;
        let gameActive = false;
        let timerId;
        let targetNote = "";
        
        const s = 24; // 行距
        // 精確的音位對齊 (以第三線為中心 0)
        const noteMap = {
            "C4": -6, "D4": -5, "E4": -4, "F4": -3, "G4": -2, "A4": -1, "B4": 0, "C5": 1
        };
        const notePool = Object.keys(noteMap);

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = document.getElementById('game-area').offsetHeight;
            drawEverything();
        }

        window.addEventListener('resize', resizeCanvas);

        function drawStaff() {
            const centerY = canvas.height / 2;
            ctx.strokeStyle = "#5B5B5B";
            ctx.lineWidth = 2;

            // 畫五條線
            for (let i = -2; i <= 2; i++) {
                let y = centerY + (i * s);
                ctx.beginPath();
                ctx.moveTo(20, y);
                ctx.lineTo(canvas.width - 20, y);
                ctx.stroke();
            }

            // 畫高音譜號 (根據你提供的數值修正)
            ctx.save();
            ctx.fillStyle = "#5B5B5B";
            ctx.font = `${s * 4.5}px Arial`;
            ctx.textBaseline = "middle";
            ctx.translate(40, centerY + s * 0.1); 
            ctx.fillText("𝄞", 0, 0);
            ctx.restore();
        }

        function drawNote() {
            if (!targetNote) return;
            const centerY = canvas.height / 2;
            const steps = noteMap[targetNote];
            const y = centerY - (steps * (s / 2));
            const x = canvas.width / 2;

            // 畫音符頭
            ctx.fillStyle = "#5B5B5B";
            ctx.beginPath();
            ctx.ellipse(x, y, s * 0.45, s * 0.35, -Math.PI / 8, 0, 2 * Math.PI);
            ctx.fill();

            // 如果是 C4 (Middle C)，畫下加線
            if (targetNote === "C4") {
                ctx.strokeStyle = "#5B5B5B";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x - 20, y);
                ctx.lineTo(x + 20, y);
                ctx.stroke();
            }
        }

        function drawEverything() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStaff();
            drawNote();
        }

        function initGame() {
            const name = document.getElementById('playerName').value || "Musician";
            document.getElementById('name-val').innerText = name;
            document.getElementById('start-screen').classList.add('hidden');
            score = 0;
            level = 1;
            startLevel();
        }

        function startLevel() {
            timeLeft = 60 - (level - 1) * 10;
            gameActive = true;
            nextNote();
            
            if (timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-val').innerText = timeLeft;
                if (timeLeft <= 0) endLevel();
            }, 1000);
            
            updateUI();
            resizeCanvas();
        }

        function nextNote() {
            targetNote = notePool[Math.floor(Math.random() * notePool.length)];
            drawEverything();
        }

        function updateUI() {
            document.getElementById('score-val').innerText = score;
            document.getElementById('level-val').innerText = level;
        }

        function endLevel() {
            gameActive = false;
            clearInterval(timerId);
            const msgScreen = document.getElementById('msg-screen');
            msgScreen.classList.remove('hidden');
            document.getElementById('msg-body').innerText = `你的得分: ${score}`;
            
            if (level >= 3) {
                document.getElementById('msg-title').innerText = "🎉 挑戰完成！";
                document.getElementById('msg-btn').innerText = "再玩一次";
            } else {
                document.getElementById('msg-title').innerText = `Level ${level} 完成！`;
                document.getElementById('msg-btn').innerText = "進入下一關";
            }
        }

        function handleNextLevel() {
            document.getElementById('msg-screen').classList.add('hidden');
            if (level < 3) {
                level++;
                startLevel();
            } else {
                initGame();
            }
        }

        // 鋼琴點擊事件
        document.getElementById('keyboard').addEventListener('pointerdown', (e) => {
            const key = e.target.closest('.key');
            if (!key || !gameActive) return;

            const selected = key.dataset.note;
            key.classList.add('active');
            setTimeout(() => key.classList.remove('active'), 150);

            if (selected === targetNote) {
                score += 10;
                // 角色移動到對應位置
                const keyRect = key.getBoundingClientRect();
                character.style.left = (keyRect.left + keyRect.width/2 - 25) + "px";
                updateUI();
                nextNote();
            } else {
                score = Math.max(0, score - 5);
                updateUI();
            }
        });

        // 初始化畫布
        resizeCanvas();
    </script>
</body>
</html>
